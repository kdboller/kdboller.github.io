{{- define "main" }}
<header class="page-header">
  <h1>{{ .Title }}</h1>
  {{- if .Description }}
  <div class="post-description">{{ .Description }}</div>
  {{- end }}
</header>

<div class="projects-list">
  {{- range .Pages.ByDate.Reverse }}
  {{- partial "project-card.html" (dict "page" . "open" true) }}
  {{- end }}
</div>
{{- end }}
