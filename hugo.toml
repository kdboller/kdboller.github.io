baseURL = "https://kdboller.github.io/"
languageCode = "en-us"
title = "Data Informed Narratives"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 5

[params]
  env = "production"
  author = "Kevin Boller"
  description = "Sports, technology, data analytics, and personal finance."
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true

  [params.homeInfoParams]
    Title = "Hi, I'm Kevin Boller"
    Content = "Having executed across finance, product, and business intelligence, I understand what it takes to move from insight to action at scale."

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/kevinboller"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/kdboller"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/kevinboller"

  [[params.socialIcons]]
    name = "medium"
    url = "https://medium.com/@kevinboller"

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 10
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 20
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
